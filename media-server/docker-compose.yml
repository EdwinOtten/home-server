#        condition: service_completed_successfully

  # SABnzbd is used to download from usenet
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd2
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ?:error}
      - SABNZBD_USER=${SABNZBD_USER:?error}
      - SABNZBD_PASSWORD=${SABNZBD_PASSWORD:?error}
      - SABNZBD_API_KEY=${SABNZBD_API_KEY:?error}
      - SABNZBD_NZB_KEY=${SABNZBD_NZB_KEY:?error}
      - USENET_SECRET_SERVER=${USENET_SECRET_SERVER:?error}
      - USENET_SECRET_USER=${USENET_SECRET_USER:?error}
      - USENET_PASSWORD=${USENET_PASSWORD:?error}
      - USENET_PORT=${USENET_PORT}
      - USENET_CONNECTIONS=${USENET_CONNECTIONS}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - type: volume
        source: media-server-storage-root
        target: /media/downloads/usenet/complete
        volume:
          subpath: media/downloads/usenet/complete
      - type: volume
        source: media-server-storage-root
        target: /media/downloads/usenet/incomplete
        volume:
          subpath: media/downloads/usenet/incomplete
      - type: volume
        source: media-server-storage-root
        target: /config
        volume:
          subpath: services/sabnzbd
      # Mount the init scripts into the LSIO init directory.
      # LinuxServer runs custom-cont-init.d scripts via /bin/bash
      # see https://docs.linuxserver.io/general/container-customization/#custom-scripts
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/sabnzbd/init-config.sh:/custom-cont-init.d/init-config.sh:ro
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/sabnzbd/init-config.py:/opt/init-config.py:ro
    ports:
      - 18080:8080
    restart: unless-stopped
    networks:
      - media-server-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      init-folders:
        condition: service_completed_successfully

  # Sonarr is used to query, add downloads to the download queue and index TV shows
  # https://sonarr.tv/
  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr2
    environment:
      - PUID=${PUID?:error}
      - PGID=${PGID?:error}
      - TZ=${TZ?:error}
      - SONARR__AUTH__ENABLED=TRUE
      - SONARR__AUTH__METHOD=Forms
      - SONARR__AUTH__APIKEY=${SONARR_API_KEY:?error}
      - SONARR__AUTH__REQUIRED=DisabledForLocalAddresses
      - SABNZBD_API_KEY=${SABNZBD_API_KEY:?error}
      - SABNZBD_HOST=sabnzbd
      - SABNZBD_PORT=8080
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:?error}
      - JELLYFIN_HOST=jellyfin
      - JELLYFIN_PORT=8096
    volumes:
      - type: volume
        source: media-server-storage-root
        target: /media
        volume:
          subpath: media
      - type: volume
        source: media-server-storage-root
        target: /config
        volume:
          subpath: services/sonarr
      # Mount the init scripts into the LSIO init directory.
      # LinuxServer runs custom-cont-init.d scripts via /bin/bash
      # see https://docs.linuxserver.io/general/container-customization/#custom-scripts
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/sonarr/init-config.sh:/custom-cont-init.d/init-config.sh:ro
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/sonarr/init-config.py:/opt/sonarr-init-config.py:ro
    ports:
      - 18989:8989
    restart: unless-stopped
    networks:
      - media-server-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'X-Api-Key: ${SONARR_API_KEY:?error}' http://localhost:8989/api/v3/health || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      init-folders:
        condition: service_completed_successfully
      sabnzbd:
        condition: service_healthy

  # Radarr is used to query, add downloads to the download queue and index Movies
  # https://radarr.video/
  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr2
    environment:
      - PUID=${PUID?:error}
      - PGID=${PGID?:error}
      - TZ=${TZ?:error}
      - RADARR__AUTH__ENABLED=TRUE
      - RADARR__AUTH__METHOD=Forms
      - RADARR__AUTH__APIKEY=${RADARR_API_KEY:?error}
      - RADARR__AUTH__REQUIRED=DisabledForLocalAddresses
      - SABNZBD_API_KEY=${SABNZBD_API_KEY:?error}
      - SABNZBD_HOST=sabnzbd
      - SABNZBD_PORT=8080
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:?error}
      - JELLYFIN_HOST=jellyfin
      - JELLYFIN_PORT=8096
    volumes:
      - type: volume
        source: media-server-storage-root
        target: /media
        volume:
          subpath: media
      - type: volume
        source: media-server-storage-root
        target: /config
        volume:
          subpath: services/radarr
      # Mount the init scripts into the LSIO init directory.
      # LinuxServer runs custom-cont-init.d scripts via /bin/bash
      # see https://docs.linuxserver.io/general/container-customization/#custom-scripts
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/radarr/init-config.sh:/custom-cont-init.d/init-config.sh:ro
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/radarr/init-config.py:/opt/init-config.py:ro
    ports:
      - 17878:7878
    restart: unless-stopped
    networks:
      - media-server-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'X-Api-Key: ${RADARR_API_KEY:?error}' http://localhost:7878/api/v3/health || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      init-folders:
        condition: service_completed_successfully
      sabnzbd:
        condition: service_healthy

  # Configarr is used to manage quality profilea and custom formats. Configarr pushes theses to Radarr/Sonarr.
  configarr:
    image: ghcr.io/raydak-labs/configarr:1.17.2
    container_name: configarr
    user: ${PUID?:error}:${PGID?:error}
    environment:
      - TZ=${TZ?:error}
    volumes:
      - /opt/configarr-cache:/app/repos # Cache repositories
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/configarr/config:/app/config # Contains the config.yml and secrets.yml
      - type: volume 
        source: media-server-storage-root 
        target: /config2 
        volume: 
          subpath: services/configarr
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/configarr/templates:/app/templates # Optional if custom templates
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/configarr/custom-formats:/app/cfs # Optional if custom formats locally provided
    restart: unless-stopped # optional make sure this is set to no or removed. Default is no
    networks:
      - media-server-network
    depends_on:
      init-folders:
        condition: service_completed_successfully
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy


  # Prowlarr is our torrent indexer/searcher. Preolarr pushes indexes to Sonarr/Radarr.
  # https://prowlarr.com/
  prowlarr:
    image: lscr.io/linuxserver/prowlarr
    container_name: prowlarr2
    environment:
      - PUID=${PUID?:error}
      - PGID=${PGID?:error}
      - TZ=${TZ?:error}
      - PROWLARR__AUTH__ENABLED=TRUE
      - PROWLARR__AUTH__METHOD=Forms
      - PROWLARR__AUTH__APIKEY=${PROWLARR_API_KEY:?error}
      - PROWLARR__AUTH__REQUIRED=DisabledForLocalAddresses
      - NZBGEEK_API_KEY=${NZBGEEK_API_KEY:?error}
      - RADARR_API_KEY=${RADARR_API_KEY:?error}
      - RADARR_HOST=radarr
      - RADARR_PORT=7878
      - SONARR_API_KEY=${SONARR_API_KEY:?error}
      - SONARR_HOST=sonarr
      - SONARR_PORT=8989
    volumes:
      - type: volume
        source: media-server-storage-root
        target: /config
        volume:
          subpath: services/prowlarr
      # Mount the init scripts into the LSIO init directory.
      # LinuxServer runs custom-cont-init.d scripts via /bin/bash
      # see https://docs.linuxserver.io/general/container-customization/#custom-scripts
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/prowlarr/init-config.sh:/custom-cont-init.d/init-config.sh:ro
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/prowlarr/init-config.py:/opt/prowlarr-init-config.py:ro
    ports:
      - 19696:9696
    restart: unless-stopped
    networks:
      - media-server-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'X-Api-Key: ${PROWLARR_API_KEY:?error}' http://localhost:9696/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      init-folders:
        condition: service_completed_successfully
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy

  # Bazarr is used to query, add downloads to the download queue and index subtitles
  # https://www.bazarr.media/
  bazarr:
    image: lscr.io/linuxserver/bazarr
    container_name: bazarr2
    environment:
      - PUID=${PUID?:error}
      - PGID=${PGID?:error}
      - TZ=${TZ?:error}
      - BAZARR_API_KEY=${BAZARR_API_KEY:?error}
      - SONARR_API_KEY=${SONARR_API_KEY:?error}
      - RADARR_API_KEY=${RADARR_API_KEY:?error}
      - SONARR_PORT=18989
      - RADARR_PORT=17878
    volumes:
      - type: volume
        source: media-server-storage-root
        target: /media
        volume:
          subpath: media
      - type: volume
        source: media-server-storage-root
        target: /config
        volume:
          subpath: services/bazarr
      # Mount the init script into the LSIO init directory
      # see https://docs.linuxserver.io/general/container-customization/#custom-scripts
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/bazarr/init-config.sh:/custom-cont-init.d/init-config.sh:ro
    ports:
      - 16767:6767
    restart: unless-stopped
    networks:
      - media-server-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'X-Api-Key: ${BAZARR_API_KEY:?error}' http://localhost:6767/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      init-folders:
        condition: service_completed_successfully
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy

  # Jellyfin is a media server that allows client devices to stream content.
  # https://jellyfin.org/
  jellyfin:
    image: lscr.io/linuxserver/jellyfin
    container_name: jellyfin2
    environment:
      - PUID=${PUID:?error}
      - PGID=${PGID:?error}
      - TZ=${TZ:?error}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:?error}
      - JELLYFIN_ADMIN_USER=${JELLYFIN_ADMIN_USER:?error}
      - JELLYFIN_ADMIN_PASSWORD=${JELLYFIN_ADMIN_PASSWORD:?error}
    ports:
      - 18096:8096/tcp
      - 17359:7359/udp
    volumes:
      - type: volume
        source: media-server-storage-root
        target: /config
        volume:
          subpath: services/jellyfin
# not mapping cache directory should create a non-persistent volume
#      - jellyfin-cache:/cache
      - type: volume
        source: media-server-storage-root
        target: /media
        volume:
          subpath: media
      - old-downloads:/old-downloads
      # Mount the init scripts into the LSIO init directory.
      # LinuxServer runs custom-cont-init.d scripts via /bin/bash
      # see https://docs.linuxserver.io/general/container-customization/#custom-scripts
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/jellyfin/init-config.sh:/custom-cont-init.d/init-config.sh:ro
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/jellyfin/init-config.py:/opt/init-config.py:ro
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    restart: 'unless-stopped'
    networks:
      - media-server-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8096/health || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      init-folders:
        condition: service_completed_successfully

  # Seerr allows users to submit content requests, which are forwarded to 
  # Radarr/Sonarr after an optional approval.
  # https://seerr.dev/
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ?:error}
      - PORT=5055 #optional
      - API_KEY=${SEERR_API_KEY:?error}
    ports:
      - 5055:5055
    volumes:
      - type: volume
        source: media-server-storage-root
        target: /app/config
        volume:
          subpath: services/seerr
    restart: unless-stopped
    networks:
      - media-server-network
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    depends_on:
      init-folders:
        condition: service_completed_successfully
      jellyfin:
        condition: service_healthy

  # Configure Seerr through its API after first start so setup is unattended.
  seerr-init:
    image: python:3.12-alpine
    container_name: seerr-init
    environment:
      - TZ=${TZ?:error}
      - SEERR_URL=http://seerr:5055
      - SEERR_EMAIL=info@edwinotten.com
      - SEERR_API_KEY=${SEERR_API_KEY:?error}
      - JELLYFIN_ADMIN_USER=${JELLYFIN_ADMIN_USER:?error}
      - JELLYFIN_ADMIN_PASSWORD=${JELLYFIN_ADMIN_PASSWORD:?error}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:?error}
      - RADARR_API_KEY=${RADARR_API_KEY:?error}
      - SONARR_API_KEY=${SONARR_API_KEY:?error}
    volumes:
      - /opt/home-server-data/github.com/EdwinOtten/home-server/media-server/seerr:/opt/seerr:ro
    command: ["python3", "/opt/seerr/init-config.py"]
    restart: "no"
    networks:
      - media-server-network
    depends_on:
      seerr:
        condition: service_healthy
      jellyfin:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy

networks:
  media-server-network:
    driver: bridge

volumes:
  old-downloads:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.1.111,nolock,ro,soft,nfsvers=4
      device: ":/volume1/downloads"

  media-server-storage-root:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.1.111,nfsvers=4,rw
      device: ":/volume1/media-server-storage"
