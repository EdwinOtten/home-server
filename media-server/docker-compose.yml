#      - WEBUI_PORT=8081
#    volumes:
#      - /etc/localtime:/etc/localtime:ro
#      - type: volume
#        source: media-server-storage-root
#        target: /media/downloads/torrent/complete
#        volume:
#          subpath: media/downloads/torrent/complete
#      - type: volume
#        source: media-server-storage-root
#        target: /media/downloads/torrent/incomplete
#        volume:
#          subpath: media/downloads/torrent/incomplete
#      - type: volume
#        source: media-server-storage-root
#        target: /config
#        volume:
#          subpath: services/qbittorrent
#    restart: unless-stopped
#    ports:
#      - 18081:8081
#    healthcheck:
#      test: ["CMD-SHELL", "curl -f http://localhost:8081/ || exit 1"]
